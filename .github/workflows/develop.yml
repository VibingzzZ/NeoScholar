name: Develop CI - Basic Validation

on:
  push:
    branches: [ develop, feature/CI_CD ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  backend-compile:
    name: Backend - Compile Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Compile Backend
        run: mvn compile -B

  frontend-build:
    name: Frontend - Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
name: Develop CI - Test & Build

on:
  push:
    branches: [ develop, feature/CI_CD ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend - Unit Tests (exclude AI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: neo_scholar
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Wait for MySQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" -p"123456" --silent 2>/dev/null; do
            sleep 3
          done
          echo "MySQL is ready."

      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p123456 neo_scholar < src/main/resources/schema.sql
          echo "Database schema initialized."

      - name: Run unit tests (exclude AI)
        env:
          SPRING_PROFILES_ACTIVE: ci
        run: mvn test -B -e -Pci

  frontend-build:
    name: Frontend - Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
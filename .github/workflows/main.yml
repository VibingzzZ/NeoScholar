name: Main CI/CD - Full Pipeline

on:
  push:
    branches: [ main, feature/CI_CD ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend - Test & Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: neo_scholar
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Wait for MySQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" -p"123456" --silent 2>/dev/null; do
            sleep 3
          done
          echo "MySQL is ready."

      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p123456 neo_scholar < src/main/resources/schema.sql
          echo "Database schema initialized."

      - name: Run Backend Tests
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          SPRING_PROFILES_ACTIVE: ci
        run: mvn verify -B

      - name: Package Backend
        run: mvn package -DskipTests -B

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend/target/*.jar
          retention-days: 7

  frontend-build:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 7

  # ============================================================
  # CD stage: Deploy via Docker
  # ============================================================
  deploy:
    name: Deploy to Production
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: Backend/target

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t neoscholar:latest .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/neoscholar
            docker compose down
            docker compose pull
            docker compose up -d
            echo "Deployment completed."
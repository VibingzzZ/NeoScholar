spring:
  data:
    redis:
      port: 6379
      host: localhost
      password: ""
      # 连接池配置
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-idle: 8        # 最大空闲连接数
          min-idle: 0        # 最小空闲连接数
          max-wait: -1ms     # 最大等待时间
      # 超时配置
      timeout: 3000ms        # 连接超时时间
      # 数据库索引
      database: 3
  datasource:
    url: jdbc:mysql://localhost:3306/neo_scholar?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY:}
      model-name: qwen-plus
      temperature: 0.7
      max-tokens: 2000
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY:}
      model-name: qwen-plus
      temperature: 0.7
      max-tokens: 2000
#    embedding-model:
#      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
#      api-key: ${QWEN_API_KEY}
#      model-name: text-embedding-v3
#      dimension: 1024
  community:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 4          # 独立 DB，和业务缓存 (db=3) 隔离
logging:
  level:
    org.springframework.ai.chat.client.advisor: debug
    com.example.ai: debug
    com.baomidou.mybatisplus: debug

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix:
      table-underline: true
  # 项目使用 @Mapper 注解，无需 XML Mapper 文件
  type-aliases-package: com.javaee.backend.entity

# JWT 配置
jwt:
  secret: "neoscholar-jwt-secret-key-at-least-32-characters-long-2024"
  expiration-ms: 86400000
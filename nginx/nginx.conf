# =============================
# NeoScholar Nginx 配置
# 角色：反向代理 + 静态文件服务
# =============================

worker_processes auto; # 自动设置CPU核心数

events {
    worker_connections 1024; # 每个worker最大连接数
    multi_accept on; # 允许一个worker进程处理多个连接
    use epoll; # 使用epoll事件模型
}



# server管域名，location管路径
http{
    server_tokens off; # 关闭显示Nginx版本号
    gzip on;
      gzip_comp_level 6;
      gzip_min_length 1000;
      gzip_types text/plain text/css application/json application/javascript
                 text/xml application/xml application/xml+rss text/javascript
                 image/svg+xml application/wasm;
      gzip_vary on;
      gzip_proxied any;

    sendfile on; # 零拷贝传输
    tcp_nopush on; # sendfile模式下，将响应头和文件内容打包在一个TCP包中发送
    tcp_nodelay on; # 禁用Nagle算法，小包立即发送不等待合并
    keepalive_timeout 65; # 保持连接超时时间
    # MIME类型配置
    include mime.types;
    default_type application/octet-stream;
    # 负载均衡配置
    upstream backend{
        server neoscholar-app:8080;
        keepalive 32; # 保持32个到后端的空闲长连接，避免每次请求重新建立TCP连接
    }
    server{
        listen 80;
        server_name _;
        # 只允许项目用的 HTTP 方法，拒绝 TRACE/OPTIONS 等
        if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH)$) {
            return 405;
        }
        location / {
        # 路径转发
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

         location /api/chat/stream {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 关键：关闭代理缓冲，SSE 数据立即转发给客户端
            proxy_buffering off;

            # 关键：禁用 nginx 自己的分块传输编码
            chunked_transfer_encoding off;

            # 关键：延长读写超时（AI 生成回复可能需要较长时间）
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # 保持连接
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request"'
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}
